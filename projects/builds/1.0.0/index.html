                scene.$B(function (c) {
                    c.update(1);
                });
            };

            consoleLog('beginLoadGameResources');

            TASKS_RUN( projectData.res, a => {

                BUS.$C($D);

            });

        }
    });

});



// прототип геймплея

options.$E = 0;

var levelIndex = 1;
var score = 0;
var shots = 0;
var maxLevelIndex = 3;

var level
    , rubber
    , blocks = []
    , big_blocks = 0;

function looperPostOne(f, delay) {
    if (f.$F > 0) {
        f.$F = _clearTimeout(f.$F);
    }

    if (!f.$F) {
        if (delay) {
            f.$F = _setTimeout(() => {
                f.$F = 0;
                f();
            }, delay);
        } else {
            f.$F = -1;
            looperPost(() => {
                f.$F = 0;
                f();
            });
        };
    }
}



function relImpactSpeed(bodyA, bodyB) {
    var va = bodyA.velocity, vb = bodyB.velocity
        , v = new Vector2(va.x - vb.x, va.y - vb.y);
    return v.$G();
}

function addBreakBlock(x, y, velocity){
    var breack_block = level.$H({
        $I: 'break_' + randomInt(1, 9),
        $J: [x, y, -20],
        $K: randomInt(0, 360),
        $L: {
            $M: false,
            $N: 10,
            $O: 1,
            $P: 50,
            $Q: 0,
            $R: 1,
            $S: 1
        }
    });
    looperPost(a => {
        if (breack_block.$T){
            ph_Body.setVelocity(breack_block.$T, new Vector2(velocity.x + randomFloat(-10, 10),velocity.y + randomFloat(-8, 3)));
            _setTimeout(() => {
                if (breack_block.$T) {
                    initCollision(breack_block.$T, breack_block, 50);
                    _setTimeout(() => {
                        if (!breack_block.$U) {
                            removeBlock(breack_block);
                        }
                    }, randomFloat(5, 10));
                }
            }, 1);
        }
    });
}

function getScore() {
    if (shots <= 3) {
        return 3
    }

    if (shots <= 6) {
        return 2
    }

    return 1
}

function awakeBlocks(){

    $each(blocks, b => {
        b.$V();
    });
}

function removeBlock(block){
    removeFromArray(block, blocks);
    var size = block.$W, v = block.$T.velocity;

    block.$X();

    looperPostOne(awakeBlocks);


    if (block.$Y) {

        playSound('break_' + randomInt(1, 4), 0, 0, 0.5);

        var step = 50,
            bx = block.$Z - size.x/2,
            by = block.$a - size.y/2;

        // todo: не учитывается вращение блока
        for (var x = 0; x < size.x; x += step) {
            for (var y = 0; y < size.y; y += step) {
                addBreakBlock(bx + x, by + y, v);
            }
        }

        big_blocks--;
        if (big_blocks == 0) {
            _setTimeout(() => {
                show_win();
            }, 1);
        }
    } else {
        if (random() > 0.5 && !windowManager.$b()) {
            playSound('break_' + randomInt(1, 4), 0, 0, 0.5);
        }
    }

}

function initCollision(body, node, hp){
    blocks.push(node);
    body.$c = hp;
    body.$d = (speed) => {
        var dmg = floor(clamp((speed - 1) * (speed - 2), 0, 100));
        if (dmg && body.$c) {
            // consoleLog('damage', dmg);
            body.$c = mmax(0, body.$c - dmg);
            if (!body.$c) {
                body.$d = 0;
                looperPost(a => {
                    removeBlock(node);
                });
            }
        }
    }
}


function show_win() {

    score += getScore();

    playSound('win');

    var hasNextLevel = levelIndex < maxLevelIndex;

    // todo: посчитать очки игрока и выдать звезды
    showWindow('win', wnd => {
        wnd.$e({
            score: {
                $f: 'Score: ' + score,
            },

            stars: {
                $f: getScore() + ' *'
            },

            button: {
                $f: hasNextLevel ? TR('next_level') : TR('try_again'),
                $g(){
                    closeWindow('win');
                    if (hasNextLevel) {
                        nextLevel();
                    } else {
                        restartGame();
                    }
                },
                $h: 1
            }

        })
    })

}

function initLevel(){

    // добавляем первый уровень на сцену
    level = scene
        .$H('level_' + levelIndex)
        .$e({
            rubber(node) {
                rubber = node;
            },

            userInputArea: {
                $i: 1,
                $j(x, y, dx, dy) {
                    // натягиваем резинку
                    var dmouse = this.$k = this.$l.$m().sub(new Vector2(x, y));
                    rubber.$n.$K = -dmouse.$o() * RAD2DEG;
                    rubber.$p = dmouse.$G();
                },
                $q() {
                    rubber.$r();
                },
                $s() {

                    shots++
                    playSound('punch');

                    // отпускаем резинку
                    rubber.$t({
                        $p: 10
                    }, 0.4, 0, easeElasticO);
                    var wp = this.$l
                        , shotDirection = this.$k.$m().$u()
                        , muzzle = new Vector2(wp.x, wp.y).$v(shotDirection.$w(72))
                        , bullet = level.$H({
                            $I: 'circle1',
                            $W: [28, 28],
                            $J: [muzzle.x, muzzle.y, -25],
                            $L: {
                                $M: false,
                                $N: 130,
                                $O: 0.2,
                                $P: 500,
                                $Q: 10,
                                $R: 4,
                                $S: 1
                            }
                        }).update()
                        , velocity = this.$k.$w(0.2);

                    if (bullet.$T) {
                        ph_Body.setVelocity(bullet.$T, velocity);
                    }

                    // пуля исчезает через 2 сек
                    _setTimeout(() => {
                        bullet.$X();
                    }, 2);

                }
            }
        });


    _setTimeout(a => {
        level.update(1);

        // настраиваем коллизии для отработки повреждения блоков
        ph_Events.on(ph_Engine, 'collisionStart', (event) => {
            var pairs = event.pairs, i, pair, bodyA, bodyB, speed;
            for (i = 0; i < pairs.length; i++) {
                pair = pairs[i];
                bodyA = pair.bodyA;
                bodyB = pair.bodyB;
                speed = relImpactSpeed(bodyA, bodyB);

                if (bodyA && bodyA.$d) bodyA.$d(speed);
                if (bodyB && bodyB.$d) bodyB.$d(speed);
            }
        });

        // проходим по уровню и инициализируем блоки
        level.$x(node => {
            var body = node.$T;
            if (body && !body.isStatic) { // this is block
                node.$Y = 1;
                big_blocks++;
                initCollision(body, node, 100);
            }
        });

    }, 0.01);
}

function nextLevel() {
    levelIndex++
    if (levelIndex > maxLevelIndex) {
        levelIndex = 1;
    }

    reloadLevel();
}

function restartGame() {
    levelIndex = 1;
    score = 0;
    reloadLevel();
}

function reloadLevel() {

    if (level) {
        level.$X();
    }

    blocks = [];
    big_blocks = 0;
    shots = 0;
    initLevel();

}


BUS.$y(
    $D, a => {
        initLevel();
        return 1;
    }
);
